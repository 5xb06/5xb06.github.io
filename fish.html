<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>오다빈 상세페이지</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 네가 준 기본 틀 유지 */
        .profile-card {
            position: relative; 
        }

        /* 왼쪽 상단 물고기 장식 */
        .deco-fish {
            position: absolute;
            top: 50px;
            left: -30px;
            width: 120px;
            z-index: 10;
        }

        /* 오른쪽 하단 별 장식 */
        .deco-stars {
            position: absolute;
            bottom: 30px;
            right: -20px;
            width: 150px;
            z-index: 10;
        }

        /* 앞 페이지들과 동일한 위치 고정 스타일 */
        .btn-group {
            position: fixed;
            bottom: 50px;
            right: 50px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="profile-card">
            <img src="IMAGES/fish.png" class="deco-fish" alt="물고기 장식">

            <p class="intro-text">
                제가 가장 좋아하는 색깔은<br>
                소라색 이에요<br><br>
                여름에 태어나서 그런지<br>
                시원한 분위기를 좋아해요<br><br>
                그리고 편지쓰는걸 정말<br>
                좋아해요<br><br>
                여기까지 보셨다면 제가 어떤사람인지<br>
                잘 알게 되실거에요 ★<br><br><br>
                봐주셔서 감사합니다
            </p>

            <img src="IMAGES/stars.png" class="deco-stars" alt="별 장식">

            <footer class="footer-text">copyright @ 2026 오다빈</footer>
        </div>
    </div>

    <div class="btn-group">
        <a href="dream.html" class="next-btn">← 이전 편지</a>
        <a href="index.html" class="next-btn">처음으로 가기 🏠</a>
    </div>
</body>
</html>
